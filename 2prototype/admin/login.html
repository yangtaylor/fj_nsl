<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920">
  <title>登录 - 体彩管理后台</title>
  <link rel="stylesheet" href="../css/common.css">
  <link rel="stylesheet" href="../css/admin-backend.css">
  <style>
    .admin-login-page {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1890FF 0%, #096DD9 100%);
      position: relative;
      overflow: hidden;
    }
    .admin-login-page::before {
      content: '';
      position: absolute;
      top: -15%;
      right: -8%;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,255,255,0.08) 0%, transparent 70%);
    }
    .admin-login-page::after {
      content: '';
      position: absolute;
      bottom: -20%;
      left: -5%;
      width: 500px;
      height: 500px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,255,255,0.05) 0%, transparent 70%);
    }
    .admin-login-box {
      width: 400px;
      background: #FFF;
      border-radius: var(--radius-lg);
      padding: 48px 40px 36px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
      position: relative;
      z-index: 1;
      animation: slideUp 0.5s ease;
    }
    .admin-login-logo {
      text-align: center;
      margin-bottom: 36px;
    }
    .admin-login-logo-icon {
      width: 56px;
      height: 56px;
      margin: 0 auto 16px;
      background: linear-gradient(135deg, #1890FF, #096DD9);
      border-radius: var(--radius-lg);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 16px rgba(24,144,255,0.3);
    }
    .admin-login-logo-icon svg {
      width: 32px;
      height: 32px;
      fill: white;
    }
    .admin-login-logo h1 {
      font-size: 24px;
      color: var(--admin-primary);
      font-weight: 700;
      letter-spacing: 1px;
    }
    .admin-login-logo p {
      font-size: 14px;
      color: var(--admin-text-hint);
      margin-top: 6px;
    }
    .admin-login-form-group {
      margin-bottom: 20px;
    }
    .admin-login-form-label {
      display: block;
      font-size: 14px;
      color: var(--admin-text-secondary);
      margin-bottom: 8px;
      font-weight: 500;
    }
    .admin-login-form-input {
      width: 100%;
      height: 44px;
      padding: 0 16px;
      border: 1px solid var(--admin-border);
      border-radius: var(--radius-sm);
      font-size: 14px;
      transition: border-color 0.2s;
    }
    .admin-login-form-input:focus {
      border-color: var(--admin-primary);
      box-shadow: 0 0 0 2px rgba(24,144,255,0.1);
    }
    .admin-login-form-input::placeholder {
      color: var(--admin-text-hint);
    }
    .admin-login-remember {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 24px;
      font-size: 14px;
      color: var(--admin-text-secondary);
      cursor: pointer;
    }
    .admin-login-remember input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: var(--admin-primary);
      cursor: pointer;
    }
    .admin-login-submit {
      width: 100%;
      height: 44px;
      background: var(--admin-primary);
      color: white;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .admin-login-submit:hover {
      background: var(--admin-primary-light);
    }
    .admin-login-submit:active {
      background: var(--admin-primary-dark);
    }
    .admin-login-footer {
      text-align: center;
      margin-top: 32px;
      padding-top: 20px;
      border-top: 1px solid #F0F0F0;
      font-size: 12px;
      color: var(--admin-text-hint);
    }
    .admin-login-bg-decor {
      position: absolute;
      z-index: 0;
    }
    .admin-login-bg-decor-1 {
      top: 10%;
      left: 8%;
      width: 200px;
      height: 200px;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 50%;
    }
    .admin-login-bg-decor-2 {
      bottom: 15%;
      right: 12%;
      width: 300px;
      height: 300px;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 50%;
    }
    .admin-login-bg-decor-3 {
      top: 40%;
      left: 20%;
      width: 80px;
      height: 80px;
      background: rgba(255,255,255,0.03);
      border-radius: var(--radius-lg);
      transform: rotate(45deg);
    }
  </style>
</head>
<body>
  <div class="admin-login-page">
    <div class="admin-login-bg-decor admin-login-bg-decor-1"></div>
    <div class="admin-login-bg-decor admin-login-bg-decor-2"></div>
    <div class="admin-login-bg-decor admin-login-bg-decor-3"></div>

    <div class="admin-login-box">
      <div class="admin-login-logo">
        <div class="admin-login-logo-icon">
          <svg viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 10.99h7c-.53 4.12-3.28 7.79-7 8.94V12H5V6.3l7-3.11v8.8z"/></svg>
        </div>
        <h1>体彩管理后台</h1>
        <p>即开票营销管理平台</p>
      </div>

      <div class="admin-login-form-group">
        <label class="admin-login-form-label">用户名</label>
        <input type="text" class="admin-login-form-input" placeholder="请输入用户名">
      </div>
      <div class="admin-login-form-group">
        <label class="admin-login-form-label">密码</label>
        <input type="password" class="admin-login-form-input" placeholder="请输入密码">
      </div>
      <label class="admin-login-remember">
        <input type="checkbox"> 记住我
      </label>
      <button class="admin-login-submit" onclick="location.href='dashboard.html'">登 录</button>

      <div class="admin-login-footer">© 2026 福建省体育彩票管理中心</div>
    </div>
  </div>
</body>
</html>
