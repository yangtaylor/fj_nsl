<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920">
  <title>角色分配 - 后台管理系统</title>
  <link rel="stylesheet" href="../css/common.css">
  <link rel="stylesheet" href="../css/admin-backend.css">
  <style>
    .role-assign-layout {
      display: grid;
      grid-template-columns: 300px 1fr;
      gap: 20px;
      min-height: 600px;
    }
    .role-list-panel {
      background: #FFF;
      border-radius: var(--radius-md);
      box-shadow: 0 1px 2px rgba(0,0,0,0.04);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .role-list-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--admin-border);
      font-size: 15px;
      font-weight: 600;
      color: var(--admin-text);
    }
    .role-list-items {
      padding: 8px 0;
      flex: 1;
    }
    .role-list-item {
      padding: 14px 20px;
      cursor: pointer;
      transition: all 0.2s;
      border-left: 3px solid transparent;
    }
    .role-list-item:hover {
      background: #F5F5F5;
    }
    .role-list-item.active {
      background: #E6F7FF;
      border-left-color: var(--admin-primary);
    }
    .role-list-item-name {
      font-size: 14px;
      font-weight: 500;
      color: var(--admin-text);
      margin-bottom: 4px;
    }
    .role-list-item-desc {
      font-size: 12px;
      color: var(--admin-text-hint);
    }
    .perm-panel {
      background: #FFF;
      border-radius: var(--radius-md);
      box-shadow: 0 1px 2px rgba(0,0,0,0.04);
      display: flex;
      flex-direction: column;
    }
    .perm-panel-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--admin-border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .perm-panel-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--admin-text);
    }
    .perm-panel-subtitle {
      font-size: 13px;
      color: var(--admin-text-hint);
      margin-top: 2px;
    }
    .perm-tree {
      padding: 20px;
      flex: 1;
      overflow-y: auto;
    }
    .perm-module {
      margin-bottom: 20px;
    }
    .perm-module:last-child {
      margin-bottom: 0;
    }
    .perm-module-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 0;
    }
    .perm-checkbox {
      width: 16px;
      height: 16px;
      border: 1px solid #D9D9D9;
      border-radius: 3px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      user-select: none;
      cursor: default;
    }
    .perm-checkbox.checked {
      background: var(--admin-primary);
      border-color: var(--admin-primary);
    }
    .perm-checkbox.checked::after {
      content: '✓';
      color: #FFF;
      font-size: 11px;
      font-weight: 700;
    }
    .perm-checkbox.indeterminate {
      background: var(--admin-primary);
      border-color: var(--admin-primary);
    }
    .perm-checkbox.indeterminate::after {
      content: '—';
      color: #FFF;
      font-size: 11px;
      font-weight: 700;
    }
    .perm-module-name {
      font-size: 14px;
      font-weight: 500;
      color: var(--admin-text);
    }
    .perm-module-children {
      display: flex;
      gap: 24px;
      padding-left: 40px;
      padding-top: 4px;
      padding-bottom: 4px;
    }
    .perm-child {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .perm-child-name {
      font-size: 13px;
      color: var(--admin-text-secondary);
    }
  </style>
</head>
<body>
  <div class="admin-app">
    <div class="admin-sidebar">
      <div class="admin-sidebar-logo">
        <span class="admin-sidebar-logo-text">体彩<em>管理后台</em></span>
      </div>
      <div class="admin-sidebar-menu">
        <div class="admin-sidebar-group">
          <div class="admin-sidebar-group-title">概览</div>
          <a class="admin-sidebar-item" href="dashboard.html"><span class="admin-sidebar-item-icon">📊</span>数据仪表盘</a>
        </div>
        <div class="admin-sidebar-group">
          <div class="admin-sidebar-group-title">商品管理</div>
          <a class="admin-sidebar-item" href="product-list.html"><span class="admin-sidebar-item-icon">🎫</span>票种列表</a>
          <a class="admin-sidebar-item" href="product-shelf.html"><span class="admin-sidebar-item-icon">📋</span>上下架管理</a>
          <a class="admin-sidebar-item" href="serial-number.html"><span class="admin-sidebar-item-icon">🔢</span>序列号管理</a>
        </div>
        <div class="admin-sidebar-group">
          <div class="admin-sidebar-group-title">订单管理</div>
          <a class="admin-sidebar-item" href="order-list.html"><span class="admin-sidebar-item-icon">📦</span>订单列表</a>
          <a class="admin-sidebar-item" href="order-alert.html"><span class="admin-sidebar-item-icon">⚠️</span>异常预警</a>
        </div>
        <div class="admin-sidebar-group">
          <div class="admin-sidebar-group-title">门店管理</div>
          <a class="admin-sidebar-item" href="store-list.html"><span class="admin-sidebar-item-icon">🏪</span>门店列表</a>
        </div>
        <div class="admin-sidebar-group">
          <div class="admin-sidebar-group-title">系统管理</div>
          <a class="admin-sidebar-item" href="user-manage.html"><span class="admin-sidebar-item-icon">👤</span>用户管理</a>
          <a class="admin-sidebar-item active" href="role-assign.html"><span class="admin-sidebar-item-icon">🔑</span>角色分配</a>
          <a class="admin-sidebar-item" href="audit-log.html"><span class="admin-sidebar-item-icon">📝</span>操作日志</a>
          <a class="admin-sidebar-item" href="device-list.html"><span class="admin-sidebar-item-icon">💻</span>设备授权</a>
        </div>
        <div class="admin-sidebar-group">
          <div class="admin-sidebar-group-title">财务管理</div>
          <a class="admin-sidebar-item" href="commission.html"><span class="admin-sidebar-item-icon">💰</span>佣金计算</a>
          <a class="admin-sidebar-item" href="reconciliation.html"><span class="admin-sidebar-item-icon">📑</span>对账管理</a>
          <a class="admin-sidebar-item" href="report-export.html"><span class="admin-sidebar-item-icon">📤</span>报表导出</a>
        </div>
        <div class="admin-sidebar-group">
          <div class="admin-sidebar-group-title">经营分析</div>
          <a class="admin-sidebar-item" href="analysis-multi.html"><span class="admin-sidebar-item-icon">📈</span>多维分析</a>
          <a class="admin-sidebar-item" href="analysis-compare.html"><span class="admin-sidebar-item-icon">📊</span>门店对比</a>
          <a class="admin-sidebar-item" href="analysis-structure.html"><span class="admin-sidebar-item-icon">🥧</span>票种结构</a>
        </div>
      </div>
    </div>

    <div class="admin-main">
      <div class="admin-header">
        <div class="admin-header-left">
          <div class="admin-header-breadcrumb">系统管理 / <span>角色分配</span></div>
        </div>
        <div class="admin-header-right">
          <div class="admin-header-user">
            <div class="admin-header-avatar">管</div>
            <span style="font-size:14px;color:var(--admin-text);">管理员</span>
          </div>
        </div>
      </div>

      <div class="admin-content">
        <div class="role-assign-layout">
          <div class="role-list-panel">
            <div class="role-list-header">
              <span>角色列表</span>
            </div>
            <div class="role-list-items" id="roleListItems"></div>
          </div>

          <div class="perm-panel">
            <div class="perm-panel-header">
              <div>
                <div class="perm-panel-title" id="permPanelTitle">系统管理员 · 权限配置</div>
                <div class="perm-panel-subtitle" id="permPanelSubtitle">当前角色拥有全部系统权限</div>
              </div>
            </div>
            <div class="perm-tree" id="permTree"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    var modules = ['数据仪表盘', '商品管理', '订单监控', '门店管理', '账号权限', '设备授权', '财务结算', '经营分析'];
    var actions = ['查看', '新增', '编辑', '删除'];

    var roles = [
      {
        name: '系统管理员',
        desc: '全部权限',
        perms: { '数据仪表盘': [1,1,1,1], '商品管理': [1,1,1,1], '订单监控': [1,1,1,1], '门店管理': [1,1,1,1], '账号权限': [1,1,1,1], '设备授权': [1,1,1,1], '财务结算': [1,1,1,1], '经营分析': [1,1,1,1] }
      },
      {
        name: '运营专员',
        desc: '商品 / 订单 / 门店 / 财务 / 分析',
        perms: { '数据仪表盘': [1,0,0,0], '商品管理': [1,1,1,1], '订单监控': [1,1,1,0], '门店管理': [1,1,1,0], '账号权限': [0,0,0,0], '设备授权': [0,0,0,0], '财务结算': [1,1,0,0], '经营分析': [1,0,0,0] }
      },
      {
        name: '店长',
        desc: '订单 / 库存 / 看板',
        perms: { '数据仪表盘': [1,0,0,0], '商品管理': [1,0,0,0], '订单监控': [1,1,1,0], '门店管理': [1,0,0,0], '账号权限': [0,0,0,0], '设备授权': [0,0,0,0], '财务结算': [1,0,0,0], '经营分析': [1,0,0,0] }
      },
      {
        name: '销售员',
        desc: '订单 / 库存',
        perms: { '数据仪表盘': [0,0,0,0], '商品管理': [1,0,0,0], '订单监控': [1,1,0,0], '门店管理': [0,0,0,0], '账号权限': [0,0,0,0], '设备授权': [0,0,0,0], '财务结算': [0,0,0,0], '经营分析': [0,0,0,0] }
      }
    ];

    var currentRoleIndex = 0;

    function renderRoleList() {
      var container = document.getElementById('roleListItems');
      var html = '';
      for (var i = 0; i < roles.length; i++) {
        var r = roles[i];
        html += '<div class="role-list-item' + (i === currentRoleIndex ? ' active' : '') + '" onclick="switchRole(' + i + ')">';
        html += '<div class="role-list-item-name">' + r.name + '</div>';
        html += '<div class="role-list-item-desc">' + r.desc + '</div>';
        html += '</div>';
      }
      container.innerHTML = html;
    }

    function switchRole(index) {
      currentRoleIndex = index;
      renderRoleList();
      renderPermPanel();
    }

    function renderPermPanel() {
      var role = roles[currentRoleIndex];
      document.getElementById('permPanelTitle').textContent = role.name + ' · 权限配置';

      var permCount = 0;
      var totalPerms = modules.length * actions.length;
      for (var m = 0; m < modules.length; m++) {
        var pArr = role.perms[modules[m]];
        for (var a = 0; a < actions.length; a++) {
          if (pArr[a]) permCount++;
        }
      }
      document.getElementById('permPanelSubtitle').textContent = '已配置 ' + permCount + ' / ' + totalPerms + ' 项权限';

      var tree = document.getElementById('permTree');
      var html = '';
      for (var m = 0; m < modules.length; m++) {
        var modName = modules[m];
        var pArr = role.perms[modName];
        var checkedCount = 0;
        for (var a = 0; a < actions.length; a++) {
          if (pArr[a]) checkedCount++;
        }
        var parentState = '';
        if (checkedCount === actions.length) parentState = 'checked';
        else if (checkedCount > 0) parentState = 'indeterminate';

        html += '<div class="perm-module">';
        html += '<div class="perm-module-header">';
        html += '<div class="perm-checkbox ' + parentState + '"></div>';
        html += '<span class="perm-module-name">' + modName + '</span>';
        html += '</div>';
        html += '<div class="perm-module-children">';
        for (var a = 0; a < actions.length; a++) {
          var childState = pArr[a] ? 'checked' : '';
          html += '<div class="perm-child">';
          html += '<div class="perm-checkbox ' + childState + '"></div>';
          html += '<span class="perm-child-name">' + actions[a] + '</span>';
          html += '</div>';
        }
        html += '</div></div>';
      }
      tree.innerHTML = html;
    }

    renderRoleList();
    renderPermPanel();
  </script>
</body>
</html>
