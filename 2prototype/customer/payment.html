<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1280">
  <title>扫码支付 - 顾客点单终端</title>
  <link rel="stylesheet" href="../css/common.css">
  <link rel="stylesheet" href="../css/customer-terminal.css">
  <style>
    .payment-amount-section {
      background: linear-gradient(135deg, #C4161C, #E8383E);
      padding: 36px 24px 32px;
      text-align: center;
      color: white;
    }
    .payment-amount-label {
      font-size: 15px;
      opacity: 0.85;
      margin-bottom: 8px;
    }
    .payment-amount-value {
      font-size: 52px;
      font-weight: 700;
      letter-spacing: 2px;
    }
    .payment-amount-value::before {
      content: '¥';
      font-size: 28px;
      margin-right: 4px;
    }
    .payment-tabs {
      display: flex;
      background: white;
      border-bottom: 1px solid var(--color-border-light);
    }
    .payment-tab {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 14px;
      font-size: 15px;
      font-weight: 500;
      color: var(--color-text-secondary);
      cursor: pointer;
      position: relative;
      transition: color 0.2s;
    }
    .payment-tab.active {
      color: var(--color-primary);
    }
    .payment-tab.active::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 48px;
      height: 3px;
      background: var(--color-primary);
      border-radius: 2px;
    }
    .payment-tab-icon {
      font-size: 20px;
    }
    .payment-qr-area {
      background: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 24px 24px;
    }
    .payment-qr-box {
      width: 260px;
      height: 260px;
      border: 2px solid var(--color-border);
      border-radius: var(--radius-lg);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 24px;
      background: white;
      position: relative;
    }
    .payment-qr-grid {
      width: 220px;
      height: 220px;
      display: grid;
      grid-template-columns: repeat(22, 1fr);
      grid-template-rows: repeat(22, 1fr);
      gap: 1px;
    }
    .payment-qr-grid span {
      border-radius: 1px;
    }
    .payment-qr-grid span.b {
      background: #333;
    }
    .payment-qr-grid span.w {
      background: #fff;
    }
    .payment-qr-logo {
      position: absolute;
      width: 48px;
      height: 48px;
      background: white;
      border: 2px solid var(--color-border-light);
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }
    .payment-help {
      font-size: 14px;
      color: var(--color-text-hint);
      text-align: center;
    }
    .payment-countdown {
      font-size: 16px;
      color: var(--color-text-secondary);
      margin-top: 20px;
      text-align: center;
    }
    .payment-countdown strong {
      color: var(--color-primary);
      font-size: 22px;
      font-weight: 700;
    }
    .payment-cancel {
      text-align: center;
      padding: 24px;
    }
    .payment-cancel a {
      font-size: 14px;
      color: var(--color-text-hint);
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="customer-app">
    <div class="customer-statusbar">
      <span>14:30</span>
      <div style="display:flex;align-items:center;gap:8px;">
        <svg viewBox="0 0 24 24" style="width:14px;height:14px;fill:white;"><path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9zm8 8l3 3 3-3c-1.65-1.66-4.34-1.66-6 0zm-4-4l2 2c2.76-2.76 7.24-2.76 10 0l2-2C15.14 9.14 8.87 9.14 5 13z"/></svg>
        <svg viewBox="0 0 24 24" style="width:14px;height:14px;fill:white;"><path d="M15.67 4H14V2h-4v2H8.33C7.6 4 7 4.6 7 5.33v15.33C7 21.4 7.6 22 8.33 22h7.33c.74 0 1.34-.6 1.34-1.33V5.33C17 4.6 16.4 4 15.67 4zM13 18h-2v-2h2v2zm0-4H11V9h2v5z"/></svg>
      </div>
    </div>

    <div class="customer-header">
      <span class="customer-header-title">扫码支付</span>
    </div>

    <div class="customer-body">
      <div class="payment-amount-section">
        <div class="payment-amount-label">支付金额</div>
        <div class="payment-amount-value">70</div>
      </div>

      <div class="payment-tabs">
        <div class="payment-tab active">
          <span class="payment-tab-icon">💬</span>
          <span>微信支付</span>
        </div>
        <div class="payment-tab">
          <span class="payment-tab-icon">🔷</span>
          <span>支付宝</span>
        </div>
      </div>

      <div class="payment-qr-area">
        <div class="payment-qr-box">
          <div class="payment-qr-grid" id="qrGrid"></div>
          <div class="payment-qr-logo">🎫</div>
        </div>
        <div class="payment-help">请使用微信/支付宝扫描二维码完成支付</div>
        <div class="payment-countdown">
          支付剩余时间 <strong>04:32</strong>
        </div>
      </div>

      <div class="payment-cancel">
        <a href="ticket-browse.html">取消订单</a>
      </div>
    </div>
  </div>

  <script>
    (function() {
      var grid = document.getElementById('qrGrid');
      var pattern = [
        '1111111010101011111111',
        '1000001010101010000001',
        '1011101010101010111001',
        '1011101010101010111001',
        '1011101010101010111001',
        '1000001010101010000001',
        '1111111010101011111111',
        '0000000010101000000000',
        '1110111010101011101111',
        '0101001010101010010100',
        '1010111010101011101010',
        '0101001010101010010100',
        '1110111010101011101111',
        '0000000010101000000000',
        '1111111010101011111111',
        '1000001010101010000001',
        '1011101010101010111001',
        '1011101000101010111001',
        '1011101010101010111001',
        '1000001010101010000001',
        '1111111010101011111111',
        '0000000000000000000000'
      ];
      for (var r = 0; r < pattern.length; r++) {
        for (var c = 0; c < pattern[r].length; c++) {
          var span = document.createElement('span');
          span.className = pattern[r][c] === '1' ? 'b' : 'w';
          grid.appendChild(span);
        }
      }
    })();
  </script>
</body>
</html>
