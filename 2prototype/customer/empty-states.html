<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1280">
  <title>空状态展示 - 顾客点单终端</title>
  <link rel="stylesheet" href="../css/common.css">
  <link rel="stylesheet" href="../css/customer-terminal.css">
  <style>
    .empty-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
      padding: 24px;
    }
    .empty-card {
      background: var(--color-bg-card);
      border-radius: var(--radius-xl);
      padding: 40px 32px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      box-shadow: var(--shadow-card);
    }
    .empty-illustration {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
      position: relative;
    }
    .empty-illustration.ticket {
      background: linear-gradient(135deg, #FFF1F0, #FFCCC7);
    }
    .empty-illustration.ticket::before {
      content: '';
      position: absolute;
      width: 44px;
      height: 52px;
      border-radius: 6px;
      border: 3px solid #FFA39E;
      transform: rotate(-8deg);
    }
    .empty-illustration.ticket::after {
      content: '';
      position: absolute;
      width: 44px;
      height: 52px;
      border-radius: 6px;
      border: 3px solid #FF7875;
      transform: rotate(8deg);
      opacity: 0.5;
    }
    .empty-illustration.search {
      background: linear-gradient(135deg, #E6F7FF, #BAE7FF);
    }
    .empty-illustration.search::before {
      content: '';
      position: absolute;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 3px solid #69C0FF;
    }
    .empty-illustration.search::after {
      content: '';
      position: absolute;
      width: 14px;
      height: 3px;
      background: #69C0FF;
      border-radius: 2px;
      transform: rotate(45deg) translate(18px, 4px);
    }
    .empty-illustration.cart {
      background: linear-gradient(135deg, #F6FFED, #D9F7BE);
    }
    .empty-illustration.cart::before {
      content: '';
      position: absolute;
      width: 40px;
      height: 32px;
      border-radius: 0 0 8px 8px;
      border: 3px solid #95DE64;
      border-top: none;
    }
    .empty-illustration.cart::after {
      content: '';
      position: absolute;
      width: 48px;
      height: 3px;
      background: #95DE64;
      border-radius: 2px;
      top: 32px;
    }
    .empty-illustration.shelf {
      background: linear-gradient(135deg, #FFF7E6, #FFE58F);
    }
    .empty-illustration.shelf::before {
      content: '';
      position: absolute;
      width: 40px;
      height: 4px;
      background: #FFD666;
      border-radius: 2px;
      top: 36px;
    }
    .empty-illustration.shelf::after {
      content: '';
      position: absolute;
      width: 32px;
      height: 28px;
      border-radius: 4px;
      border: 3px solid #FFD666;
      opacity: 0.5;
      top: 28px;
    }
    .empty-illustration-icon {
      position: relative;
      z-index: 1;
      font-size: 36px;
    }
    .empty-card-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--color-text-primary);
      margin-bottom: 8px;
    }
    .empty-card-subtitle {
      font-size: 14px;
      color: var(--color-text-hint);
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="customer-app">
    <div class="customer-statusbar">
      <span>12:30</span>
      <span>福建省体育彩票</span>
      <span>WiFi</span>
    </div>
    <div class="customer-header">
      <div class="customer-header-back">‹</div>
      <div class="customer-header-title">空状态展示</div>
    </div>
    <div class="customer-body">
      <div class="empty-grid">
        <div class="empty-card">
          <div class="empty-illustration ticket">
            <span class="empty-illustration-icon">🎫</span>
          </div>
          <div class="empty-card-title">暂无可售票种</div>
          <div class="empty-card-subtitle">当前门店暂无可售票种</div>
        </div>

        <div class="empty-card">
          <div class="empty-illustration search">
            <span class="empty-illustration-icon">🔍</span>
          </div>
          <div class="empty-card-title">无匹配结果</div>
          <div class="empty-card-subtitle">未找到符合条件的票种</div>
        </div>

        <div class="empty-card">
          <div class="empty-illustration cart">
            <span class="empty-illustration-icon">🛒</span>
          </div>
          <div class="empty-card-title">购物车为空</div>
          <div class="empty-card-subtitle">快去选购心仪的票种吧</div>
        </div>

        <div class="empty-card">
          <div class="empty-illustration shelf">
            <span class="empty-illustration-icon">📦</span>
          </div>
          <div class="empty-card-title">该票种已下架</div>
          <div class="empty-card-subtitle">该票种已下架，请选择其他票种</div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
