<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1366">
  <title>库存查询 - 收银台终端</title>
  <link rel="stylesheet" href="../css/common.css">
  <link rel="stylesheet" href="../css/cashier-terminal.css">
  <style>
    .query-search-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
      background: #FFF;
      padding: 12px 16px;
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-card);
    }
    .query-search-input {
      flex: 1;
      height: 36px;
      padding: 0 12px;
      border: 1px solid var(--color-border);
      border-radius: var(--radius-sm);
      font-size: 14px;
    }
    .query-search-input:focus {
      border-color: var(--color-primary);
      box-shadow: 0 0 0 2px rgba(196, 22, 28, 0.1);
    }
    .query-search-btn {
      padding: 8px 20px;
      background: var(--color-primary);
      color: white;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }
    .query-search-btn:hover {
      background: var(--color-primary-dark);
    }
    .query-summary {
      display: flex;
      gap: 24px;
      margin-bottom: 16px;
      padding: 12px 16px;
      background: #FFF;
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-card);
      font-size: 14px;
      color: var(--color-text-secondary);
    }
    .query-summary-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .query-summary-item strong {
      font-size: 18px;
      font-weight: 700;
    }
    .query-summary-item .val-total { color: var(--color-text-primary); }
    .query-summary-item .val-normal { color: var(--color-success); }
    .query-summary-item .val-warning { color: var(--color-warning); }
    .query-summary-item .val-danger { color: var(--color-error); }
    .query-status-tag {
      display: inline-flex;
      align-items: center;
      padding: 2px 10px;
      border-radius: var(--radius-sm);
      font-size: 12px;
      font-weight: 500;
    }
    .query-status-tag.normal {
      background: #F6FFED;
      color: var(--color-success);
    }
    .query-status-tag.warning {
      background: #FFF7E6;
      color: var(--color-warning);
    }
    .query-status-tag.danger {
      background: #FFF1F0;
      color: var(--color-error);
    }
    .query-stock-bar {
      width: 100%;
      height: 6px;
      background: #F0F0F0;
      border-radius: 3px;
      overflow: hidden;
      margin-top: 4px;
    }
    .query-stock-bar-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.3s;
    }
    .query-stock-bar-fill.green { background: var(--color-success); }
    .query-stock-bar-fill.orange { background: var(--color-warning); }
    .query-stock-bar-fill.red { background: var(--color-error); }
    .query-table {
      width: 100%;
      background: #FFF;
      border-radius: var(--radius-md);
      overflow: hidden;
      box-shadow: var(--shadow-card);
    }
    .query-table table {
      width: 100%;
      border-collapse: collapse;
    }
    .query-table th {
      background: #FAFAFA;
      padding: 12px 16px;
      text-align: left;
      font-size: 13px;
      color: var(--color-text-hint);
      font-weight: 500;
      border-bottom: 1px solid var(--color-border-light);
    }
    .query-table td {
      padding: 12px 16px;
      font-size: 14px;
      color: var(--color-text-primary);
      border-bottom: 1px solid var(--color-border-light);
    }
    .query-table tr:last-child td {
      border-bottom: none;
    }
    .query-table tr.row-warning td {
      background: #FFFBF0;
    }
    .query-table tr.row-danger td {
      background: #FFF5F5;
    }
  </style>
</head>
<body>
  <div class="cashier-app">
    <div class="cashier-sidebar">
      <div class="cashier-sidebar-logo">
        <span class="cashier-sidebar-logo-text">体彩<em>收银台</em></span>
      </div>
      <div class="cashier-sidebar-menu">
        <a href="main-workspace.html" class="cashier-sidebar-item">
          <span class="cashier-sidebar-item-icon">📊</span>
          <span>工作台</span>
        </a>
        <a href="order-process.html" class="cashier-sidebar-item">
          <span class="cashier-sidebar-item-icon">📋</span>
          <span>订单处理</span>
        </a>
        <a href="proxy-order.html" class="cashier-sidebar-item">
          <span class="cashier-sidebar-item-icon">🛒</span>
          <span>代客下单</span>
        </a>
        <div class="cashier-sidebar-item active">
          <span class="cashier-sidebar-item-icon">📦</span>
          <span>库存管理</span>
        </div>
        <div class="cashier-sidebar-sub show">
          <a href="stock-in.html">入库签收</a>
          <a href="inventory-check.html">库存盘点</a>
          <a href="inventory-query.html" class="active">库存查询</a>
          <a href="inventory-alert.html">库存预警</a>
        </div>
        <a href="sales-dashboard.html" class="cashier-sidebar-item">
          <span class="cashier-sidebar-item-icon">📈</span>
          <span>销售看板</span>
        </a>
      </div>
      <div class="cashier-sidebar-user">
        <div class="cashier-sidebar-avatar">张</div>
        <span>张销售</span>
        <a href="login.html" class="cashier-sidebar-logout">退出登录</a>
      </div>
    </div>
    <div class="cashier-main">
      <div class="cashier-topbar">
        <span class="cashier-topbar-title">库存查询</span>
        <div class="cashier-topbar-actions">
          <span style="font-size:13px;color:var(--color-text-hint);">2026-05-29 14:32</span>
        </div>
      </div>
      <div class="cashier-content">
        <div class="query-search-bar">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#999" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
          </svg>
          <input class="query-search-input" type="text" placeholder="输入票种名称搜索">
          <button class="query-search-btn">查询</button>
        </div>

        <div class="query-summary">
          <div class="query-summary-item">总票种 <strong class="val-total">6</strong></div>
          <div style="color:var(--color-border);">|</div>
          <div class="query-summary-item">正常 <strong class="val-normal">3</strong></div>
          <div style="color:var(--color-border);">|</div>
          <div class="query-summary-item">预警 <strong class="val-warning">2</strong></div>
          <div style="color:var(--color-border);">|</div>
          <div class="query-summary-item">缺货 <strong class="val-danger">1</strong></div>
        </div>

        <div class="query-table">
          <table>
            <thead>
              <tr>
                <th>票种</th>
                <th>面值</th>
                <th>库存数量</th>
                <th>库存占比</th>
                <th>预警阈值</th>
                <th>状态</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td>中国红</td>
                <td>¥10</td>
                <td>85</td>
                <td>
                  <div class="query-stock-bar"><div class="query-stock-bar-fill green" style="width:85%"></div></div>
                </td>
                <td>20</td>
                <td><span class="query-status-tag normal">正常</span></td>
              </tr>
              <tr>
                <td>好运十倍</td>
                <td>¥20</td>
                <td>60</td>
                <td>
                  <div class="query-stock-bar"><div class="query-stock-bar-fill green" style="width:60%"></div></div>
                </td>
                <td>20</td>
                <td><span class="query-status-tag normal">正常</span></td>
              </tr>
              <tr>
                <td>顶呱刮</td>
                <td>¥10</td>
                <td>45</td>
                <td>
                  <div class="query-stock-bar"><div class="query-stock-bar-fill green" style="width:45%"></div></div>
                </td>
                <td>20</td>
                <td><span class="query-status-tag normal">正常</span></td>
              </tr>
              <tr class="row-warning">
                <td>绿茵传奇</td>
                <td>¥30</td>
                <td>15</td>
                <td>
                  <div class="query-stock-bar"><div class="query-stock-bar-fill orange" style="width:15%"></div></div>
                </td>
                <td>20</td>
                <td><span class="query-status-tag warning">预警</span></td>
              </tr>
              <tr class="row-danger">
                <td>金光灿烂</td>
                <td>¥30</td>
                <td>8</td>
                <td>
                  <div class="query-stock-bar"><div class="query-stock-bar-fill red" style="width:8%"></div></div>
                </td>
                <td>20</td>
                <td><span class="query-status-tag danger">预警</span></td>
              </tr>
              <tr class="row-danger">
                <td>大满贯</td>
                <td>¥50</td>
                <td>0</td>
                <td>
                  <div class="query-stock-bar"><div class="query-stock-bar-fill red" style="width:0%"></div></div>
                </td>
                <td>20</td>
                <td><span class="query-status-tag danger">缺货</span></td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
