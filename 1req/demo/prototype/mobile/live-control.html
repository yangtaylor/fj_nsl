<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>直播控制台</title>
    <link rel="stylesheet" href="../assets/css/common.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0d0d0d;
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .mobile-container {
            max-width: 414px;
            margin: 0 auto;
            min-height: 100vh;
            position: relative;
            background: linear-gradient(180deg, #1a1a2e 0%, #0d0d0d 100%);
        }

        /* 状态栏 */
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 16px;
            font-size: 14px;
            background: rgba(0,0,0,0.3);
        }

        .status-time {
            font-weight: 600;
        }

        .status-icons {
            display: flex;
            gap: 6px;
            align-items: center;
        }

        /* 头部 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: rgba(0,0,0,0.2);
        }

        .header-title {
            font-size: 17px;
            font-weight: 600;
        }

        .header-actions {
            display: flex;
            gap: 16px;
        }

        .header-icon {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }

        /* 直播预览区 */
        .live-preview {
            aspect-ratio: 9/16;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .live-badge {
            position: absolute;
            top: 12px;
            left: 12px;
            background: #ff4757;
            color: #fff;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .live-badge::before {
            content: '';
            width: 6px;
            height: 6px;
            background: #fff;
            border-radius: 50%;
            animation: blink 1.5s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .viewer-count {
            position: absolute;
            top: 12px;
            right: 12px;
            background: rgba(0,0,0,0.5);
            color: #fff;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .preview-placeholder {
            text-align: center;
            color: rgba(255,255,255,0.8);
        }

        .preview-icon {
            font-size: 64px;
            margin-bottom: 16px;
            opacity: 0.6;
        }

        .preview-text {
            font-size: 16px;
            margin-bottom: 8px;
        }

        .preview-subtext {
            font-size: 13px;
            opacity: 0.6;
        }

        /* 直播控制区 */
        .control-section {
            padding: 20px 16px;
        }

        .section-title {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-title::before {
            content: '';
            width: 3px;
            height: 16px;
            background: #1890ff;
            border-radius: 2px;
        }

        /* 主控制按钮 */
        .main-controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 24px;
        }

        .control-btn {
            padding: 16px;
            border-radius: 12px;
            border: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .control-btn.start {
            background: linear-gradient(135deg, #52c41a 0%, #389e0d 100%);
            color: #fff;
        }

        .control-btn.stop {
            background: linear-gradient(135deg, #ff4757 0%, #c0392b 100%);
            color: #fff;
        }

        .control-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .control-btn .icon {
            font-size: 28px;
        }

        .control-btn .text {
            font-size: 14px;
            font-weight: 600;
        }

        /* 推荐票种 */
        .ticket-section {
            margin-bottom: 24px;
        }

        .ticket-list {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            padding-bottom: 8px;
            scrollbar-width: none;
        }

        .ticket-list::-webkit-scrollbar {
            display: none;
        }

        .ticket-card {
            flex-shrink: 0;
            width: 100px;
            background: rgba(255,255,255,0.08);
            border-radius: 12px;
            padding: 12px;
            text-align: center;
            border: 2px solid transparent;
            cursor: pointer;
            transition: all 0.3s;
        }

        .ticket-card:hover,
        .ticket-card.active {
            border-color: #1890ff;
            background: rgba(24,144,255,0.15);
        }

        .ticket-img {
            width: 60px;
            height: 60px;
            background: rgba(255,255,255,0.1);
            border-radius: 8px;
            margin: 0 auto 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
        }

        .ticket-name {
            font-size: 13px;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .ticket-price {
            font-size: 14px;
            font-weight: 600;
            color: #ff6b6b;
        }

        .ticket-check {
            position: absolute;
            top: 8px;
            right: 8px;
            width: 20px;
            height: 20px;
            background: #1890ff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            opacity: 0;
            transition: all 0.3s;
        }

        .ticket-card.active .ticket-check {
            opacity: 1;
        }

        /* 快捷操作 */
        .quick-actions {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        .action-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            padding: 12px 8px;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .action-item:hover {
            background: rgba(255,255,255,0.1);
        }

        .action-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            background: rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .action-text {
            font-size: 12px;
            color: rgba(255,255,255,0.7);
        }

        /* 底部导航 */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 414px;
            background: rgba(13,13,13,0.95);
            backdrop-filter: blur(20px);
            display: flex;
            justify-content: space-around;
            padding: 8px 0 24px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 4px 16px;
            cursor: pointer;
            text-decoration: none;
            color: rgba(255,255,255,0.5);
        }

        .nav-item.active {
            color: #1890ff;
        }

        .nav-icon {
            font-size: 24px;
        }

        .nav-text {
            font-size: 11px;
        }

        /* 直播时长 */
        .live-duration {
            position: absolute;
            bottom: 12px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.6);
            padding: 6px 16px;
            border-radius: 16px;
            font-size: 14px;
            font-weight: 500;
        }

        /* 互动消息预览 */
        .chat-preview {
            position: absolute;
            bottom: 60px;
            left: 12px;
            right: 12px;
            max-height: 120px;
            overflow: hidden;
        }

        .chat-item {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
            font-size: 13px;
        }

        .chat-avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            flex-shrink: 0;
        }

        .chat-content {
            background: rgba(0,0,0,0.4);
            padding: 6px 12px;
            border-radius: 12px;
            color: rgba(255,255,255,0.9);
        }

        .chat-name {
            color: #ffd700;
            font-weight: 500;
        }

        /* 安全区域 */
        .safe-area-bottom {
            height: 80px;
        }
    </style>
</head>
<body>

        </div>

        <!-- 头部 -->
        <div class="header">

            <div class="header-actions">
                <div class="header-icon">⚙️</div>

                <button class="control-btn stop" onclick="toggleLive(false)" disabled>
                    <span class="icon">⏹️</span>
                    <span class="text">结束直播</span>
                </button>
            </div>

            <!-- 推荐票种 -->
            <div class="ticket-section">
                <div class="section-title">推荐票种</div>
                <div class="ticket-list">
                    <div class="ticket-card active" style="position: relative;">
                        <div class="ticket-check">✓</div>
                        <div class="ticket-img">🎫</div>
                        <div class="ticket-name">好运十倍</div>
                        <div class="ticket-price">¥10</div>
                    </div>
                    <div class="ticket-card" style="position: relative;">
                        <div class="ticket-check">✓</div>
                        <div class="ticket-img">💎</div>
                        <div class="ticket-name">绿翡翠</div>
                        <div class="ticket-price">¥10</div>
                    </div>
                    <div class="ticket-card" style="position: relative;">
                        <div class="ticket-check">✓</div>
                        <div class="ticket-img">🎯</div>
                        <div class="ticket-name">点石成金</div>
                        <div class="ticket-price">¥20</div>
                    </div>
                    <div class="ticket-card" style="position: relative;">
                        <div class="ticket-check">✓</div>
                        <div class="ticket-img">🏆</div>
                        <div class="ticket-name">中国红</div>
                        <div class="ticket-price">¥20</div>
                    </div>
                    <div class="ticket-card" style="position: relative;">
                        <div class="ticket-check">✓</div>
                        <div class="ticket-img">🎲</div>
                        <div class="ticket-name">大乐透</div>
                        <div class="ticket-price">¥2</div>
                    </div>
                </div>
            </div>

            <!-- 快捷操作 -->
            <div class="section-title">快捷操作</div>
            <div class="quick-actions">
                <div class="action-item">

                <div class="action-item">
                    <div class="action-icon" style="background: rgba(40,167,69,0.2);">📢</div>

                </div>
                <div class="action-item">
                    <div class="action-icon" style="background: rgba(23,162,184,0.2);">🎵</div>

                <div class="action-item">
                    <div class="action-icon" style="background: rgba(108,117,125,0.2);">💬</div>
                    <span class="action-text">弹幕设置</span>

                <div class="action-item">
                    <div class="action-icon" style="background: rgba(111,66,193,0.2);">👥</div>

        <div class="safe-area-bottom"></div>

        <!-- 底部导航 -->
        <div class="bottom-nav">
            <a href="live-control.html" class="nav-item active">
                <span class="nav-icon">📹</span>
                <span class="nav-text">直播</span>
            </a>
            <a href="live-stats.html" class="nav-item">
                <span class="nav-icon">📊</span>
                <span class="nav-text">数据</span>
            </a>

                <span class="nav-text">我的</span>
            </div>
        </div>
    </div>

    <script>
        let isLive = false;

        function toggleLive(start) {
            const startBtn = document.querySelector('.control-btn.start');
            const stopBtn = document.querySelector('.control-btn.stop');
            const badge = document.querySelector('.live-badge');

            if (start) {
                isLive = true;
                startBtn.disabled = true;
                stopBtn.disabled = false;
                badge.style.display = 'flex';
            } else {
                isLive = false;
                startBtn.disabled = false;
                stopBtn.disabled = true;
                badge.style.display = 'none';
            }
        }

        // 票种选择
        document.querySelectorAll('.ticket-card').forEach(card => {
            card.addEventListener('click', function() {
                this.classList.toggle('active');
            });
        });

        // 更新时间
        function updateTime() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            document.querySelector('.status-time').textContent = `${hours}:${minutes}`;
        }
        setInterval(updateTime, 1000);
        updateTime();
    </script>
</body>
</html>
