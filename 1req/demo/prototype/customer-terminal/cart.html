<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>体彩服务角 - 购物车</title>
  <link rel="stylesheet" href="../assets/css/common.css">
  <style>
    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .pad-container {
      width: 1024px;
      height: 768px;
      background: #f5f5f5;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 25px 50px rgba(0,0,0,0.3);
      display: flex;
      flex-direction: column;
    }

    /* Header */
    .header {
      background: linear-gradient(135deg, #E60012 0%, #ff4757 100%);
      color: white;
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-icon {
      width: 40px;
      height: 40px;
      background: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      color: #E60012;
      font-size: 18px;
    }

    .logo-text {
      font-size: 20px;
      font-weight: 600;
    }

    .back-btn {
      background: rgba(255,255,255,0.2);
      border: none;
      color: white;
      padding: 8px 20px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* Cart Content */
    .cart-content {
      flex: 1;
      padding: 24px;
      overflow-y: auto;
    }

    .cart-title {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 24px;
      color: #333;
    }

    .cart-items {
      background: white;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 20px;
    }

    .cart-item {
      display: flex;
      align-items: center;
      padding: 16px;
      border-bottom: 1px solid #f0f0f0;
      gap: 16px;
    }

    .cart-item:last-child {
      border-bottom: none;
    }

    .item-image {
      width: 80px;
      height: 80px;
      border-radius: 12px;
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
    }

    .item-info {
      flex: 1;
    }

    .item-name {
      font-size: 16px;
      font-weight: 600;
      color: #333;
      margin-bottom: 4px;
    }

    .item-desc {
      font-size: 13px;
      color: #999;
    }

    .item-price {
      font-size: 18px;
      font-weight: 700;
      color: #E60012;
      margin-right: 20px;
    }

    .quantity-control {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .qty-btn {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: 1px solid #d9d9d9;
      background: white;
      cursor: pointer;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .qty-btn:hover {
      border-color: #E60012;
      color: #E60012;
    }

    .qty-value {
      font-size: 16px;
      font-weight: 600;
      min-width: 30px;
      text-align: center;
    }

    .delete-btn {
      background: none;
      border: none;
      color: #999;
      cursor: pointer;
      font-size: 20px;
      padding: 8px;
    }

    .delete-btn:hover {
      color: #E60012;
    }

    /* Cart Summary */
    .cart-summary {
      background: white;
      border-radius: 16px;
      padding: 24px;
    }

    .summary-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 12px;
      font-size: 14px;
      color: #666;
    }

    .summary-total {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 16px;
      border-top: 2px solid #f0f0f0;
      margin-top: 16px;
    }

    .total-label {
      font-size: 16px;
      font-weight: 600;
      color: #333;
    }

    .total-price {
      font-size: 28px;
      font-weight: 700;
      color: #E60012;
    }

    .checkout-btn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #E60012 0%, #ff4757 100%);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 20px;
      transition: all 0.3s;
    }

    .checkout-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(230, 0, 18, 0.3);
    }

    /* Empty Cart */
    .empty-cart {
      text-align: center;
      padding: 60px 20px;
    }

    .empty-icon {
      font-size: 64px;
      margin-bottom: 16px;
    }

    .empty-text {
      font-size: 16px;
      color: #999;
      margin-bottom: 24px;
    }

    .continue-btn {
      padding: 12px 32px;
      background: #E60012;
      color: white;
      border: none;
      border-radius: 25px;
      font-size: 16px;
      cursor: pointer;
      display: inline-block;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="pad-container">
    <!-- Header -->
    <header class="header">
      <div class="logo">
        <div class="logo-icon">体彩</div>
        <div class="logo-text">购物车</div>
      </div>
      <a href="index.html" class="back-btn">← 返回选购</a>
    </header>

    <!-- Cart Content -->
    <div class="cart-content">
      <h2 class="cart-title">🛒 我的购物车</h2>

      <div class="cart-items">
        <div class="cart-item">
          <div class="item-image">🎫</div>
          <div class="item-info">
            <div class="item-name">好运十倍</div>
            <div class="item-desc">经典玩法，中奖率高</div>
          </div>
          <div class="item-price">¥10</div>
          <div class="quantity-control">
            <button class="qty-btn">−</button>
            <span class="qty-value">2</span>
            <button class="qty-btn">+</button>
          </div>
          <button class="delete-btn">🗑️</button>
        </div>

        <div class="cart-item">
          <div class="item-image" style="background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);">🎫</div>
          <div class="item-info">
            <div class="item-name">点石成金</div>
            <div class="item-desc">最高奖金100万元</div>
          </div>
          <div class="item-price">¥20</div>
          <div class="quantity-control">
            <button class="qty-btn">−</button>
            <span class="qty-value">1</span>
            <button class="qty-btn">+</button>
          </div>
          <button class="delete-btn">🗑️</button>
        </div>

        <div class="cart-item">
          <div class="item-image" style="background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);">🎫</div>
          <div class="item-info">
            <div class="item-name">绿翡翠</div>
            <div class="item-desc">翡翠主题，清新雅致</div>
          </div>
          <div class="item-price">¥50</div>
          <div class="quantity-control">
            <button class="qty-btn">−</button>
            <span class="qty-value">1</span>
            <button class="qty-btn">+</button>
          </div>
          <button class="delete-btn">🗑️</button>
        </div>
      </div>

      <div class="cart-summary">
        <div class="summary-row">
          <span>商品数量</span>
          <span>4 张</span>
        </div>
        <div class="summary-row">
          <span>商品小计</span>
          <span>¥90.00</span>
        </div>
        <div class="summary-total">
          <span class="total-label">合计</span>
          <span class="total-price">¥90.00</span>
        </div>
        <a href="payment.html" class="checkout-btn" style="display:block;text-align:center;text-decoration:none;">确认订单 →</a>
      </div>
    </div>
  </div>
</body>
</html>
